<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cova — Update Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root {
        --g: #0a5c45; --gm: #137a5c; --gl: #1d9e75; --gp: #e6f5f0;
        --crd: #e8e4db; --ink: #0f1a14; --inkm: #2d3e35; --inkl: #5a6e63;
        --w: #fff; --fd: "Syne", sans-serif; --fb: "DM Sans", sans-serif;
      }
      body {
        font-family: var(--fb); background: linear-gradient(180deg, #f7f4ee 0%, #ecf8f3 100%);
        color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center;
      }
      .form-card {
        background: var(--w); border: 1px solid var(--crd); border-radius: 24px;
        padding: 40px; box-shadow: 0 12px 40px rgba(10, 92, 69, 0.08); max-width: 440px; width: 100%;
        margin: 20px;
      }
      .form-card h2 { font-family: var(--fd); font-size: 26px; color: var(--ink); margin-bottom: 10px; }
      .form-card p { font-size: 15px; color: var(--inkl); line-height: 1.6; margin-bottom: 24px; }
      .form-group { margin-bottom: 20px; }
      .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--inkm); margin-bottom: 8px; }
      .form-group input { width: 100%; padding: 14px 16px; border: 1.5px solid var(--crd); border-radius: 14px; background: var(--gp); font-size: 15px; outline: none; transition: 0.2s; }
      .form-group input:focus { border-color: var(--gl); background: #fff; }
      .btn-primary { width: 100%; padding: 15px 18px; background: var(--g); color: var(--w); border: none; border-radius: 14px; font-family: var(--fd); font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; }
      .btn-primary:hover { background: var(--gm); transform: translateY(-1px); }
      .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
      #error-msg { color: #d32f2f; font-size: 14px; margin-bottom: 16px; display: none; }
      #success-msg { color: var(--g); font-size: 15px; font-weight: 500; display: none; text-align: center; }
    </style>
  </head>
  <body>
    <div class="form-card">
      <h2>Update Password</h2>
      <p>Please enter your new password below.</p>
      
      <div id="error-msg"></div>
      
      <form id="update-form" onsubmit="handleUpdate(event)">
        <div class="form-group">
          <label for="new_password">New Password</label>
          <input type="password" id="new_password" placeholder="••••••••" required minlength="6" />
        </div>
        <button type="submit" id="submit-btn" class="btn-primary">Save New Password</button>
      </form>

      <div id="success-msg">
        <div style="font-size: 40px; margin-bottom: 16px;">✅</div>
        Password updated successfully!<br><br>
        <a href="cova-auth.html#login" style="color: var(--g); text-decoration: underline; font-weight: 600;">Click here to log in</a>
      </div>
    </div>

    <script>
      const supabaseUrl = 'https://sipbkoxamzsurjsojsov.supabase.co';
      const supabaseAnonKey = 'sb_publishable_K5waOlfDMf1e7nwO7CkTmQ_fMyB5E5x';
      const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

      // Check if there is a hash with an access_token or an error
      window.onload = function() {
        const hash = window.location.hash;
        if (!hash || (!hash.includes('access_token=') && !hash.includes('type=recovery'))) {
          // Check for active session just in case
          supabaseClient.auth.getSession().then(({ data: { session } }) => {
            if (!session && !hash.includes('access_token=')) {
              window.location.href = 'cova-auth.html';
            }
          });
        }
      };

      async function handleUpdate(event) {
        event.preventDefault();
        
        const password = document.getElementById('new_password').value;
        const btn = document.getElementById('submit-btn');
        const errorMsg = document.getElementById('error-msg');
        
        errorMsg.style.display = 'none';
        btn.textContent = 'Updating...';
        btn.disabled = true;

        try {
          // Since the user clicked a recovery link, Supabase creates a temporary session
          // We can now update the user's password
          const { data, error } = await supabaseClient.auth.updateUser({
            password: password
          });

          if (error) throw error;

          // Success! Hide form, show success
          document.getElementById('update-form').style.display = 'none';
          document.querySelector('h2').style.display = 'none';
          document.querySelector('p').style.display = 'none';
          document.getElementById('success-msg').style.display = 'block';

        } catch (error) {
          errorMsg.textContent = error.message;
          errorMsg.style.display = 'block';
          btn.textContent = 'Save New Password';
          btn.disabled = false;
        }
      }
    </script>
  <script src="chatbot-widget.js"></script>
  </body>
</html>
