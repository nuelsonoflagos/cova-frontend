<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cova — Housing</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="progress-container">
    <div class="progress-bar" style="width: 75%"></div>
  </div>

  <header class="onboarding-header">
    <button class="back-btn" onclick="window.location.href='cova-onboarding-personal-step4.html'">
      <span>←</span> Back
    </button>
    <a href="index.html" class="logo">
      <img src="cova-logo.png" alt="Cova" style="height: 40px; width: auto; display: block;">
    </a>
  </header>

  <main class="onboarding-main">
    <div class="onboarding-card">
      <h1 class="onboarding-title">What is your housing situation?</h1>
      <p class="onboarding-desc">This lets us recommend the right property protection for your needs.</p>

      <div class="selection-grid">
        <label class="selection-card" onclick="selectHousing(event, this, 'rent')">
          <input type="radio" name="housing" value="rent">
          <div class="radio-custom"></div>
          <div class="selection-content">
            <div class="selection-title">I rent</div>
            <div class="selection-desc">Apartment, house, or shared space.</div>
          </div>
        </label>

        <label class="selection-card" onclick="selectHousing(event, this, 'own')">
          <input type="radio" name="housing" value="own">
          <div class="radio-custom"></div>
          <div class="selection-content">
            <div class="selection-title">I own my home</div>
            <div class="selection-desc">House, condo, or duplex.</div>
          </div>
        </label>

        <label class="selection-card" onclick="selectHousing(event, this, 'live_with_family')">
          <input type="radio" name="housing" value="live_with_family">
          <div class="radio-custom"></div>
          <div class="selection-content">
            <div class="selection-title">I live with family</div>
            <div class="selection-desc">Not currently paying rent or a mortgage.</div>
          </div>
        </label>
      </div>

      <button id="next-btn" class="btn-primary" disabled onclick="nextStep()">Continue</button>
    </div>
  </main>

  <script>
    const stored = sessionStorage.getItem('cova_housing');
    if (stored) {
      document.querySelectorAll('.selection-card').forEach(card => {
        if (card.querySelector('input').value === stored) {
          card.classList.add('selected');
          document.getElementById('next-btn').disabled = false;
        }
      });
    }

    function selectHousing(e, element, value) {
      if(e) e.preventDefault();
      document.querySelectorAll('.selection-card').forEach(card => card.classList.remove('selected'));
      element.classList.add('selected');
      document.getElementById('next-btn').disabled = false;
      sessionStorage.setItem('cova_housing', value);
    }

    function nextStep() {
      window.location.href = 'cova-onboarding-personal-step6.html';
    }
  </script>
<script src="chatbot-widget.js"></script>
  </body>
</html>
