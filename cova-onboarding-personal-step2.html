<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cova — Basic Info</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="progress-container">
    <div class="progress-bar" style="width: 30%"></div>
  </div>

  <header class="onboarding-header">
    <button class="back-btn" onclick="window.location.href='cova-onboarding-welcome.html'">
      <span>←</span> Back
    </button>
    <a href="index.html" class="logo">
      <img src="cova-logo.png" alt="Cova" style="height: 40px; width: auto; display: block;">
    </a>
  </header>

  <main class="onboarding-main">
    <div class="onboarding-card">
      <h1 class="onboarding-title">Tell us about yourself</h1>
      <p class="onboarding-desc">We need a few details to set up your profile.</p>

      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" class="form-control" placeholder="e.g. Emeka" required>
      </div>

      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" class="form-control" placeholder="e.g. Adekunle" required>
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" class="form-control" placeholder="e.g. 08012345678" required>
      </div>

      <button id="next-btn" class="btn-primary" onclick="nextStep()">Continue</button>
    </div>
  </main>

  <script>
    // Pre-fill if returning
    document.getElementById('firstName').value = sessionStorage.getItem('cova_firstName') || '';
    document.getElementById('lastName').value = sessionStorage.getItem('cova_lastName') || '';
    document.getElementById('email').value = sessionStorage.getItem('cova_email') || '';
    document.getElementById('phone').value = sessionStorage.getItem('cova_phone') || '';

    function nextStep() {
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();

      if (!firstName || !lastName || !email || !phone) {
        alert("Please fill in all fields.");
        return;
      }

      sessionStorage.setItem('cova_firstName', firstName);
      sessionStorage.setItem('cova_lastName', lastName);
      sessionStorage.setItem('cova_email', email);
      sessionStorage.setItem('cova_phone', phone);

      window.location.href = 'cova-onboarding-personal-step3.html';
    }
  </script>
<script src="chatbot-widget.js"></script>
  </body>
</html>
