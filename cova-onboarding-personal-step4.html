<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cova — Employment</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="progress-container">
    <div class="progress-bar" style="width: 60%"></div>
  </div>

  <header class="onboarding-header">
    <button class="back-btn" onclick="window.location.href='cova-onboarding-personal-step3.html'">
      <span>←</span> Back
    </button>
    <a href="index.html" class="logo">
      <img src="cova-logo.png" alt="Cova" style="height: 40px; width: auto; display: block;">
    </a>
  </header>

  <main class="onboarding-main">
    <div class="onboarding-card">
      <h1 class="onboarding-title">What is your employment status?</h1>
      <p class="onboarding-desc">We use this to tailor income protection and related benefits.</p>

      <div class="selection-grid">
        <label class="selection-card" onclick="selectEmployment(event, this, 'employed')">
          <input type="radio" name="employment" value="employed">
          <div class="radio-custom"></div>
          <div class="selection-content">
            <div class="selection-title">Employed</div>
            <div class="selection-desc">Working full-time or part-time for an employer.</div>
          </div>
        </label>

        <label class="selection-card" onclick="selectEmployment(event, this, 'self_employed')">
          <input type="radio" name="employment" value="self_employed">
          <div class="radio-custom"></div>
          <div class="selection-content">
            <div class="selection-title">Self-employed / Freelance</div>
            <div class="selection-desc">Working independently.</div>
          </div>
        </label>

        <label class="selection-card" onclick="selectEmployment(event, this, 'business_owner')">
          <input type="radio" name="employment" value="business_owner">
          <div class="radio-custom"></div>
          <div class="selection-content">
            <div class="selection-title">Business Owner</div>
            <div class="selection-desc">Running a registered business.</div>
          </div>
        </label>

        <label class="selection-card" onclick="selectEmployment(event, this, 'other')">
          <input type="radio" name="employment" value="other">
          <div class="radio-custom"></div>
          <div class="selection-content">
            <div class="selection-title">Student / Unemployed / Retired</div>
            <div class="selection-desc">Not currently working.</div>
          </div>
        </label>
      </div>

      <button id="next-btn" class="btn-primary" disabled onclick="nextStep()">Continue</button>
    </div>
  </main>

  <script>
    const stored = sessionStorage.getItem('cova_employment');
    if (stored) {
      document.querySelectorAll('.selection-card').forEach(card => {
        if (card.querySelector('input').value === stored) {
          card.classList.add('selected');
          document.getElementById('next-btn').disabled = false;
        }
      });
    }

    function selectEmployment(e, element, value) {
      if(e) e.preventDefault();
      document.querySelectorAll('.selection-card').forEach(card => card.classList.remove('selected'));
      element.classList.add('selected');
      document.getElementById('next-btn').disabled = false;
      sessionStorage.setItem('cova_employment', value);
    }

    function nextStep() {
      window.location.href = 'cova-onboarding-personal-step5.html';
    }
  </script>
</body>
</html>
