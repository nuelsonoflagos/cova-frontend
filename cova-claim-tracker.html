<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#0A5C45;--gm:#137A5C;--gl:#1D9E75;--gp:#E6F5F0;--gpp:#d0ede4;
  --cream:#F7F4EE;--crd:#E8E4DB;--crd2:#D8D3C8;
  --ink:#0F1A14;--inkm:#2D3E35;--inkl:#5A6E63;--inkf:#9AADA3;
  --w:#fff;--r:#C0392B;--am:#D4860A;--amp:#FEF3E2;
  --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  --rad:18px;--radsm:10px;
}
html{scroll-behavior:smooth}
body{font-family:var(--fb);background:linear-gradient(180deg, var(--cream) 0%, #ECF8F3 100%);color:var(--ink);min-height:100vh;padding-bottom:100px}
a{text-decoration:none;color:inherit}
nav{display:flex;align-items:center;justify-content:space-between;padding:26px 5vw;max-width:1200px;margin:0 auto}
.logo{font-family:var(--fd);font-size:22px;font-weight:800;color:var(--g)}
.logo span{color:var(--gl)}
.nav-cta{font-family:var(--fd);font-size:14px;font-weight:700;color:var(--w);background:var(--g);padding:12px 20px;border-radius:999px;transition:all .2s}
.nav-cta:hover{background:var(--gm)}
.main-wrap{max-width:1160px;margin:0 auto;padding:24px 5vw 40px}
.top-card{background:var(--w);border:1px solid var(--crd);border-radius:28px;padding:30px;box-shadow:0 24px 70px rgba(10,92,69,.08);margin-bottom:24px}
.meta-row{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap}
.claim-header{display:flex;flex-direction:column;gap:10px}
.claim-title{font-family:var(--fd);font-size:clamp(30px,4vw,40px);font-weight:800;color:var(--ink);line-height:1.05}
.claim-ref{font-size:14px;font-weight:700;color:var(--inkl);letter-spacing:0.08em}
.countdown-pill{display:inline-flex;align-items:center;gap:10px;font-size:14px;font-weight:700;padding:12px 18px;border-radius:999px;background:var(--gpp);color:var(--g)}
.countdown-time{font-family:var(--fd);font-size:18px;color:var(--g)}
.grid-two{display:grid;grid-template-columns:1.5fr 1fr;gap:24px}
.tracker-card{background:var(--w);border:1px solid var(--crd);border-radius:28px;padding:30px;box-shadow:0 24px 70px rgba(10,92,69,.08);display:flex;flex-direction:column;gap:24px}
.stage-list{position:relative;padding-left:34px}
.stage-list::before{content:'';position:absolute;top:20px;left:16px;width:2px;height:calc(100% - 40px);background:var(--crd)}
.stage-item{position:relative;padding:24px 24px 24px 36px;background:var(--gp);border-radius:22px;margin-bottom:20px}
.stage-item:last-child{margin-bottom:0}
.stage-bullet{position:absolute;left:-4px;top:28px;width:32px;height:32px;border-radius:50%;display:grid;place-items:center;font-size:14px;font-weight:700;color:var(--w);background:var(--crd)}
.stage-bullet.complete{background:var(--g)}
.stage-bullet.active{background:var(--gl);animation:pulse 2s infinite}
.stage-bullet.pending{background:var(--inkf)}
.stage-meta{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.stage-title{font-size:17px;font-weight:800;color:var(--ink)}
.stage-time{font-size:13px;color:var(--inkf)}
.stage-copy{font-size:14px;color:var(--inkl);line-height:1.7}
.stage-status{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;font-size:13px;font-weight:700}
.stage-status.complete{background:var(--gpp);color:var(--g)}
.stage-status.active{background:var(--gp);color:var(--gl)}
.stage-status.pending{background:var(--amp);color:var(--am)}
.handler-card{background:var(--w);border:1px solid var(--crd);border-radius:28px;padding:28px;box-shadow:0 24px 70px rgba(10,92,69,.08);display:flex;flex-direction:column;gap:20px}
.handler-top{display:flex;align-items:center;gap:16px}
.handler-avatar{width:78px;height:78px;border-radius:24px;background:linear-gradient(135deg, rgba(10,92,69,.15), rgba(29,158,117,.15));display:grid;place-items:center;font-size:26px;color:var(--g);font-weight:800}
.handler-info{display:flex;flex-direction:column;gap:6px}
.handler-name{font-size:20px;font-weight:800;color:var(--ink)}
.handler-role{font-size:14px;color:var(--inkl)}
.whatsapp-btn{display:inline-flex;align-items:center;justify-content:center;padding:16px 18px;border-radius:16px;border:none;background:var(--gl);color:var(--w);font-weight:700;cursor:pointer;transition:all .2s}
.whatsapp-btn:hover{background:var(--gm)}
.fixed-help{position:fixed;right:20px;bottom:20px;z-index:1000}
.help-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 20px;border-radius:24px;background:var(--g);color:var(--w);font-family:var(--fd);font-size:15px;font-weight:700;border:none;cursor:pointer;box-shadow:0 18px 40px rgba(10,92,69,.16);transition:all .2s}
.help-btn:hover{background:var(--gm);transform:translateY(-1px)}

/* Product badge */
.product-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 8px;
}
.product-badge.device {
  background: rgba(22, 160, 133, 0.12);
  color: #16A085;
}
.product-badge.motor {
  background: rgba(52, 152, 219, 0.12);
  color: #3498DB;
}
.product-badge.life {
  background: rgba(233, 30, 99, 0.12);
  color: #E91E63;
}
.product-badge.health {
  background: rgba(39, 174, 96, 0.12);
  color: #27AE60;
}
.product-badge.travel {
  background: rgba(243, 156, 18, 0.12);
  color: #F39C12;
}
.product-badge.property {
  background: rgba(230, 126, 34, 0.12);
  color: #E67E22;
}
.product-badge.investment {
  background: rgba(155, 89, 182, 0.12);
  color: #9B59B6;
}
.product-badge.group {
  background: rgba(142, 68, 173, 0.12);
  color: #8E44AD;
}
.product-badge.fire {
  background: rgba(231, 76, 60, 0.12);
  color: #E74C3C;
}
.product-badge.workmen {
  background: rgba(241, 196, 15, 0.12);
  color: #D4AC0D;
}
.product-badge.gpa {
  background: rgba(211, 84, 0, 0.12);
  color: #D35400;
}

/* Progress bar */
.progress-section {
  margin-bottom: 24px;
}
.progress-bar-container {
  background: var(--crd);
  border-radius: 12px;
  height: 8px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--g), var(--gl));
  border-radius: 12px;
  transition: width 0.5s ease;
}
.progress-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-label-text {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
}
.progress-percentage {
  font-family: var(--fd);
  font-size: 18px;
  font-weight: 800;
  color: var(--g);
}

/* Product selector */
.product-selector {
  margin-bottom: 20px;
}
.product-selector select {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--crd);
  border-radius: 16px;
  background: var(--gp);
  color: var(--ink);
  outline: none;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}

/* Customer info */
.customer-info {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
}
.customer-avatar {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  background: var(--g);
  color: var(--w);
  display: grid;
  place-items: center;
  font-size: 18px;
  font-weight: 700;
}
.customer-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--inkm);
}

/* Share button */
.share-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: 16px;
  background: var(--gp);
  border: 1px solid var(--crd);
  color: var(--inkm);
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.share-btn:hover {
  background: var(--gpp);
  border-color: var(--gl);
  color: var(--g);
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.1); }
}

@media(max-width:980px){.grid-two{grid-template-columns:1fr}.meta-row{justify-content:flex-start}} 
@media(max-width:700px){
  nav{flex-direction:column;align-items:flex-start;gap:16px}
  .claim-title{font-size:28px}
  .top-card{padding:24px}
  .tracker-card,.handler-card{padding:24px}
  .stage-item{padding:20px}
  .handler-top{flex-direction:column;align-items:flex-start}
  .fixed-help{right:50%;transform:translateX(50%);width:calc(100% - 40px)}
}
@media(max-width:520px){
  body{padding-bottom:140px}
  .claim-ref,.countdown-pill{width:100%}
  .stage-list{padding-left:22px}
  .stage-item{padding-left:28px}
  .stage-bullet{left:-10px}
}
</style>
</head>

      { title: 'Claim submitted', description: 'We received your claim and confirmed your policy details.', time: '1 May 2026, 09:12', status: 'complete' },
      { title: 'Incident investigation', description: 'Third party incident investigation started.', time: '1 May 2026, 14:00', status: 'complete' },
      { title: 'Liability assessment', description: 'Liability and damages being assessed.', time: '3 May 2026, 10:00', status: 'complete' },
      { title: 'Settlement calculated', description: 'Settlement amount being calculated.', time: 'Pending', status: 'active' },
      { title: 'Claim resolved', description: 'Settlement paid and claim closed.', time: 'Pending', status: 'pending' }
    ]
  }
};

let currentProduct = 'motor';

function updateProductType() {
  currentProduct = document.getElementById('productTypeSelect').value;
  const config = PRODUCT_CONFIG[currentProduct];
  if (!config) return;
  
  // Update SLA label
  const slaLabel = document.getElementById('slaLabel');
  if (config.sla < 24) {
    slaLabel.textContent = `${config.sla}hr SLA remaining`;
  } else {
    slaLabel.textContent = `${config.sla} days SLA remaining`;
  }
  
  // Update stages
  renderStages(config.stages);
  
  // Calculate progress percentage
  updateProgress(config.stages);
}

function renderStages(stages) {
  const stageList = document.getElementById('stageList');
  stageList.innerHTML = stages.map((stage, index) => `
    <div class="stage-item">
      <div class="stage-bullet ${stage.status}">${index + 1}</div>
      <div class="stage-meta">
        <div class="stage-title">${stage.title}</div>
        <div class="stage-time">${stage.time}</div>
      </div>
      <div class="stage-copy">${stage.description}</div>
      <span class="stage-status ${stage.status}">${stage.status.charAt(0).toUpperCase() + stage.status.slice(1)}</span>
    </div>
  `).join('');
}

function updateProgress(stages) {
  const completed = stages.filter(s => s.status === 'complete').length;
  const total = stages.length;
  const percentage = Math.round((completed / total) * 100);
  
  document.getElementById('progressPercentage').textContent = `${percentage}%`;
  document.getElementById('progressFill').style.width = `${percentage}%`;
}

function shareClaim() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({
      title: 'Cova Claim Tracker',
      text: 'Track my insurance claim status',
      url: url
    });
  } else {
    navigator.clipboard.writeText(url).then(() => {
      alert('Link copied to clipboard!');
    });
  }
}

function displayClaimStatus(claim) {
  // Update claim reference
  document.querySelector('.claim-ref').textContent = 'Claim #' + claim.claim_ref;
  
  // Update claim title
  document.querySelector('.claim-title').textContent = claim.status || 'In Review';
  
  // Update handler info
  const handlerNameEl = document.querySelector('.handler-name');
  if (handlerNameEl && claim.handler_name) {
    handlerNameEl.textContent = claim.handler_name;
  }
  
  // Update SLA timer based on claim data
  const config = PRODUCT_CONFIG[currentProduct];
  if (config) {
    const slaLabel = document.getElementById('slaLabel');
    if (config.sla < 24) {
      slaLabel.textContent = `${config.sla}hr SLA remaining`;
    } else {
      slaLabel.textContent = `${config.sla} days SLA remaining`;
    }
    
    // Update stages based on claim status
    updateStagesForClaim(config.stages, claim);
  }
}

function updateStagesForClaim(stages, claim) {
  const stageList = document.getElementById('stageList');
  if (!stageList) return;
  
  // Update stage statuses based on claim data
  const updatedStages = stages.map((stage, index) => {
    // For demo, mark earlier stages as complete
    const isComplete = index < 2;
    const isActive = index === 2;
    return {
      ...stage,
      status: isComplete ? 'complete' : (isActive ? 'active' : 'pending')
    };
  });
  
  stageList.innerHTML = updatedStages.map((stage, index) => `
    <div class="stage-item">
      <div class="stage-bullet ${stage.status}">${index + 1}</div>
      <div class="stage-meta">
        <div class="stage-title">${stage.title}</div>
        <div class="stage-time">${stage.time}</div>
      </div>
      <div class="stage-copy">${stage.description}</div>
      <span class="stage-status ${stage.status}">${stage.status.charAt(0).toUpperCase() + stage.status.slice(1)}</span>
    </div>
  `).join('');
  
  // Update progress
  updateProgress(updatedStages);
}

// Get product type from URL or default to motor
function getProductType() {
  const urlParams = new URLSearchParams(window.location.search);
  const type = urlParams.get('type');
  return type && PRODUCT_CONFIG[type] ? type : 'motor';
}

// Initialize
let secondsLeft;
let timerInterval;

function updateTimer() {
  const config = PRODUCT_CONFIG[currentProduct];
  if (!config) return;
  
  const slaLabel = document.getElementById('slaLabel');
  if (config.sla < 24) {
    secondsLeft = config.sla * 3600 - 9000; // hours to seconds
  } else {
    secondsLeft = config.sla * 86400 - 9000; // days to seconds
  }
}

function formatTime(value) {
  return value.toString().padStart(2, '0');
}

function updateSLATimer() {
  const config = PRODUCT_CONFIG[currentProduct];
  if (!config || secondsLeft <= 0) return;
  
  secondsLeft -= 1;
  
  if (config.sla < 24) {
    // Format as HH:MM:SS
    const hrs = Math.floor(secondsLeft / 3600);
    const mins = Math.floor((secondsLeft % 3600) / 60);
    const secs = secondsLeft % 60;
    document.getElementById('slaTimer').textContent = `${formatTime(hrs)}:${formatTime(mins)}:${formatTime(secs)}`;
  } else {
    // Format as DD:HH:MM:SS
    const days = Math.floor(secondsLeft / 86400);
    const hrs = Math.floor((secondsLeft % 86400) / 3600);
    const mins = Math.floor((secondsLeft % 3600) / 60);
    const secs = secondsLeft % 60;
    document.getElementById('slaTimer').textContent = `${days}d ${formatTime(hrs)}:${formatTime(mins)}:${formatTime(secs)}`;
  }
}

// Page load
window.addEventListener('DOMContentLoaded', async () => {
  const claimId = new URLSearchParams(window.location.search).get('claim_id');
  
  if (!claimId) {
    alert('Claim ID not found');
    return;
  }
  
  const result = await getClaimStatus(claimId);
  
  if (result.ok) {
    displayClaimStatus(result.data.claim);
  } else {
    alert('Error loading claim: ' + result.data.error.message);
  }
});
</script>
